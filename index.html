<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-2 스마트 담임 비서 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 pb-28">

    <header class="bg-white border-b p-5 sticky top-0 z-50 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-indigo-600 italic">CLASS PRO</h1>
            <div class="flex gap-2">
                <button onclick="downloadData()" class="text-[10px] font-bold bg-slate-100 px-3 py-2 rounded-xl text-slate-500">엑셀저장</button>
                <button onclick="randomPick()" class="w-10 h-10 bg-indigo-600 text-white rounded-xl shadow-lg active:scale-90 transition"><i class="fas fa-dice"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <!-- 탭 1: 학생 관리 -->
        <div id="tab1" class="tab-content active space-y-3">
            <h2 class="font-bold text-slate-800 ml-1">학생 현황</h2>
            <div id="studentList" class="space-y-3"></div>
        </div>

        <!-- 탭 2: 수행평가 -->
        <div id="tab2" class="tab-content space-y-3">
            <h2 class="font-bold text-slate-800 ml-1">수행평가 체크</h2>
            <div id="checkList" class="bg-white rounded-3xl border divide-y shadow-sm"></div>
        </div>

        <!-- 탭 3: 좌석 배치 -->
        <div id="tab3" class="tab-content space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-slate-800 ml-1">좌석 배치도</h2>
                <button onclick="shuffleSeats()" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">자리 섞기</button>
            </div>
            <div id="seatMap" class="grid grid-cols-2 gap-4 text-center"></div>
        </div>

        <!-- 탭 4: 상담 일지 -->
        <div id="tab4" class="tab-content space-y-3">
            <h2 class="font-bold text-slate-800 ml-1">상담 기록</h2>
            <div id="logs" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 shadow-2xl z-50">
        <button onclick="switchTab(1)" class="nav-btn text-indigo-600 flex flex-col items-center"><i class="fas fa-users text-lg"></i><span class="text-[9px] font-bold mt-1">학생</span></button>
        <button onclick="switchTab(2)" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-check-double text-lg"></i><span class="text-[9px] font-bold mt-1">수행</span></button>
        <button onclick="switchTab(3)" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-th-large text-lg"></i><span class="text-[9px] font-bold mt-1">좌석</span></button>
        <button onclick="switchTab(4)" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-pen-fancy text-lg"></i><span class="text-[9px] font-bold mt-1">기록</span></button>
    </nav>

    <script>
        // 초기 데이터 (localStorage에서 불러오거나 기본값 사용)
        let students = JSON.parse(localStorage.getItem('classData')) || [
            { id: 1, name: "강민준", phone: "010-1111-2222", points: 0, done: false, seat: 0 },
            { id: 2, name: "김서윤", phone: "010-3333-4444", points: 0, done: false, seat: 1 },
            { id: 3, name: "박도윤", phone: "010-5555-6666", points: 0, done: false, seat: 2 },
            { id: 4, name: "이아윤", phone: "010-7777-8888", points: 0, done: false, seat: 3 },
            { id: 5, name: "정준우", phone: "010-9999-0000", points: 0, done: false, seat: 4 },
            { id: 6, name: "최지우", phone: "010-1234-5678", points: 0, done: false, seat: 5 }
        ];
        let logs = JSON.parse(localStorage.getItem('classLogs')) || [];

        function save() {
            localStorage.setItem('classData', JSON.stringify(students));
            localStorage.setItem('classLogs', JSON.stringify(logs));
            render();
        }

        function render() {
            // 학생 탭
            document.getElementById('studentList').innerHTML = students.map(s => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center font-bold text-slate-400">${s.id}</div>
                        <div>
                            <h3 class="font-bold text-slate-700">${s.name}</h3>
                            <p class="text-[10px] text-indigo-500 font-bold">상점: ${s.points}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updatePoint(${s.id}, 1)" class="w-8 h-8 bg-blue-50 text-blue-500 rounded-lg text-xs font-bold">+1</button>
                        <a href="tel:${s.phone}" class="w-8 h-8 bg-green-50 text-green-500 rounded-lg flex items-center justify-center text-xs"><i class="fas fa-phone"></i></a>
                        <button onclick="addLog('${s.name}')" class="w-8 h-8 bg-slate-50 text-slate-400 rounded-lg text-xs flex items-center justify-center"><i class="fas fa-edit"></i></button>
                    </div>
                </div>
            `).join('');

            // 수행평가 탭
            document.getElementById('checkList').innerHTML = students.map(s => `
                <div class="flex justify-between items-center p-4">
                    <span class="font-bold text-slate-600">${s.name}</span>
                    <button onclick="toggleDone(${s.id})" class="w-6 h-6 border-2 rounded ${s.done ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-200'}">
                        ${s.done ? '<i class="fas fa-check text-[10px]"></i>' : ''}
                    </button>
                </div>
            `).join('');

            // 좌석 배치 탭
            const seatMap = document.getElementById('seatMap');
            const sorted = [...students].sort((a, b) => a.seat - b.seat);
            seatMap.innerHTML = sorted.map(s => `
                <div class="bg-white p-6 rounded-2xl border-2 border-dashed border-slate-200">
                    <p class="text-[10px] text-slate-300 mb-1">번호: ${s.id}</p>
                    <p class="font-black text-slate-700">${s.name}</p>
                </div>
            `).join('');

            // 기록 탭
            document.getElementById('logs').innerHTML = logs.map(l => `
                <div class="bg-white p-4 rounded-xl border-l-4 border-indigo-500 shadow-sm">
                    <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-indigo-600">${l.name}</span><span class="text-slate-300">${l.time}</span></div>
                    <p class="text-sm text-slate-600">${l.content}</p>
                </div>
            `).join('') || '<p class="text-center text-slate-300 py-10 text-xs">기록이 없습니다.</p>';
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab${n}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach((b, i) => {
                b.className = `nav-btn flex flex-col items-center ${i+1===n ? 'text-indigo-600' : 'text-slate-300'}`;
            });
        }

        function updatePoint(id, v) { students.find(s=>s.id===id).points += v; save(); }
        function toggleDone(id) { const s = students.find(s=>s.id===id); s.done = !s.done; save(); }
        function addLog(n) { const m = prompt(`[${n}] 기록 입력:`); if(m) { logs.unshift({name:n, content:m, time:new Date().toLocaleString()}); save(); } }
        function randomPick() { const s = students[Math.floor(Math.random()*students.length)]; alert(`🎯 당첨: ${s.name}`); }
        function shuffleSeats() {
            let nums = Array.from({length: students.length}, (_, i) => i);
            nums.sort(() => Math.random() - 0.5);
            students.forEach((s, i) => s.seat = nums[i]);
            save();
        }
        function downloadData() {
            let csv = "이름,상점,수행여부,상담내용\n";
            students.forEach(s => {
                const sLogs = logs.filter(l => l.name === s.name).map(l => l.content).join(' | ');
                csv += `${s.name},${s.points},${s.done ? '제출' : '미제출'},${sLogs}\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "학급관리데이터.csv";
            link.click();
        }
        render();
    </script>
</body>
</html>
