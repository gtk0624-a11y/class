<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곡선중학교 학급 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .warning-card { background-color: #fee2e2 !important; border: 2px solid #f87171 !important; }
    </style>
</head>
<body class="bg-slate-50 pb-28 text-slate-800">

    <header class="bg-indigo-700 text-white p-5 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="text-left">
                <h1 class="text-lg font-black tracking-tighter">곡선중학교</h1>
                <p class="text-[10px] opacity-80 font-bold uppercase tracking-widest">학급 통합 관리 시스템</p>
            </div>
            <button onclick="toggleModal('setupModal', true)" class="text-[11px] font-bold bg-white/20 px-4 py-2 rounded-xl backdrop-blur-md border border-white/30">명단 관리</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-3"></div>
        <div id="tab2" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-center space-y-3">
                <div class="flex justify-between items-center"><span class="text-[10px] font-black text-indigo-500 uppercase">Score Sheet</span><button onclick="downloadTotalData()" class="text-[10px] font-bold text-slate-400 border px-2 py-1 rounded-lg">CSV 출력</button></div>
                <input type="text" id="subjectTitle" onchange="save()" placeholder="수행평가 항목명" class="w-full text-xl font-bold border-none outline-none p-0 text-slate-800 bg-transparent text-center focus:ring-0">
            </div>
            <div id="scoreList" class="space-y-2"></div>
        </div>
        <div id="tab3" class="tab-content space-y-4 text-center">
            <div class="flex justify-between items-center px-1"><h2 class="font-bold text-slate-700">좌석 배치도</h2><button onclick="shuffleSeats()" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full">랜덤 섞기</button></div>
            <div id="seatMap" class="grid grid-cols-2 gap-4"></div>
        </div>
        <div id="tab4" class="tab-content space-y-4">
            <div class="flex justify-between items-center px-2"><h2 class="font-bold text-slate-700">전체 기록</h2><span class="text-[9px] text-slate-400 font-bold">터치하여 기록 정정/삭제</span></div>
            <div id="logs" class="space-y-3"></div>
        </div>
    </main>

    <!-- [명단 관리 모달 - 복사 붙여넣기 최적화] -->
    <div id="setupModal" class="modal">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm space-y-5 shadow-2xl">
            <div class="text-center"><h2 class="font-black text-xl text-slate-800">학생 명단 관리</h2><p class="text-[10px] text-slate-400 mt-1">한글 파일의 표 내용을 복사해 붙이세요!</p></div>
            <textarea id="rawList" class="w-full h-48 bg-slate-50 border-0 rounded-2xl p-5 text-sm outline-none shadow-inner" placeholder="예: 30201 강민준"></textarea>
            <div class="flex gap-2">
                <button onclick="importStudents()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">명단 적용</button>
                <button onclick="if(confirm('모든 기록이 초기화됩니다.')){students=[];logs=[];save();}" class="flex-1 bg-rose-50 text-rose-500 py-4 rounded-2xl font-bold text-xs">전체 삭제</button>
            </div>
            <button onclick="toggleModal('setupModal', false)" class="w-full text-slate-400 text-xs py-1">닫기</button>
        </div>
    </div>

    <!-- [상담/출결 입력 모달] -->
    <div id="logModal" class="modal">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm space-y-4 shadow-2xl">
            <h2 id="logModalTitle" class="font-black text-2xl text-center text-indigo-600"></h2>
            <div class="grid grid-cols-1 gap-2">
                <button onclick="addAttendance('미인정 지각')" class="py-3 rounded-xl border-2 border-orange-100 bg-orange-50 text-orange-600 font-black text-sm">미인정 지각</button>
                <button onclick="addAttendance('미인정 조퇴')" class="py-3 rounded-xl border-2 border-amber-100 bg-amber-50 text-amber-600 font-black text-sm">미인정 조퇴</button>
                <button onclick="addAttendance('미인정 결과')" class="py-3 rounded-xl border-2 border-rose-100 bg-rose-50 text-rose-600 font-black text-sm">미인정 결과</button>
            </div>
            <div class="border-t pt-3 space-y-2">
                <textarea id="logText" class="w-full h-20 bg-slate-50 border-0 rounded-2xl p-4 text-sm outline-none" placeholder="기타 상담 내용..."></textarea>
                <button onclick="submitLog()" class="w-full bg-slate-800 text-white py-3 rounded-2xl font-bold">상담 저장</button>
            </div>
            <button onclick="toggleModal('logModal', false)" class="w-full text-slate-400 text-xs text-center">닫기</button>
        </div>
    </div>

    <!-- [기록 정정 모달] -->
    <div id="editLogModal" class="modal">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm space-y-4 shadow-2xl">
            <h2 class="font-black text-xl text-center">기록 정정 및 삭제</h2>
            <textarea id="editLogText" class="w-full h-32 bg-slate-50 border-0 rounded-2xl p-4 text-sm outline-none shadow-inner"></textarea>
            <div class="flex gap-2">
                <button onclick="updateIndividualLog()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold">내용 수정</button>
                <button onclick="deleteIndividualLog()" class="flex-1 bg-rose-50 text-rose-500 py-4 rounded-2xl font-bold">기록 삭제</button>
            </div>
            <button onclick="toggleModal('editLogModal', false)" class="w-full text-slate-400 text-xs text-center">취소</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t flex justify-around p-5 shadow-2xl z-50">
        <button onclick="switchTab(1)" class="nav-btn text-indigo-600 flex flex-col items-center"><i class="fas fa-users text-xl"></i><span class="text-[9px] font-bold mt-1">학생관리</span></button>
        <button onclick="switchTab(2)" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-check-double text-xl"></i><span class="text-[9px] font-bold mt-1">수행성적</span></button>
        <button onclick="switchTab(3)" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-th text-xl"></i><span class="text-[9px] font-bold mt-1">좌석배치</span></button>
        <button onclick="switchTab(4)" class="nav-btn text-slate-300 flex flex-col items-center"><i class="fas fa-history text-xl"></i><span class="text-[9px] font-bold mt-1">기록정정</span></button>
    </nav>

    <script>
        let students = JSON.parse(localStorage.getItem('classData')) || [];
        let logs = JSON.parse(localStorage.getItem('classLogs')) || [];
        let currentStudentId = "";
        let currentStudentName = "";
        let editingLogIndex = -1;

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('active', show); }

        function openLogModal(id, name) { 
            currentStudentId = id; currentStudentName = name; 
            document.getElementById('logModalTitle').innerText = name; 
            toggleModal('logModal', true); 
        }

        function addAttendance(type) {
            const s = students.find(s => s.id == currentStudentId);
            s.attendance = (s.attendance || 0) + 1;
            logs.unshift({ logId: Date.now(), studentId: currentStudentId, name: currentStudentName, type: '출결', isAttendance: true, content: `[${type}] 발생 (누적: ${s.attendance}회)`, time: new Date().toLocaleString() });
            save(); toggleModal('logModal', false);
        }

        function submitLog() {
            const val = document.getElementById('logText').value.trim();
            if(!val) return;
            logs.unshift({ logId: Date.now(), studentId: currentStudentId, name: currentStudentName, type: '상담', isAttendance: false, content: val, time: new Date().toLocaleString() });
            save(); toggleModal('logModal', false);
            document.getElementById('logText').value = "";
        }

        function openEditLog(index) {
            editingLogIndex = index;
            document.getElementById('editLogText').value = logs[index].content;
            toggleModal('editLogModal', true);
        }

        function updateIndividualLog() {
            if(editingLogIndex > -1) {
                logs[editingLogIndex].content = document.getElementById('editLogText').value;
                save(); toggleModal('editLogModal', false);
            }
        }

        function deleteIndividualLog() {
            if(confirm('삭제하시겠습니까?')) {
                const targetLog = logs[editingLogIndex];
                if(targetLog.isAttendance) {
                    const s = students.find(s => s.id == targetLog.studentId);
                    if(s && s.attendance > 0) s.attendance -= 1;
                }
                logs.splice(editingLogIndex, 1);
                save(); toggleModal('editLogModal', false);
            }
        }

        function importStudents() {
            const rawText = document.getElementById('rawList').value.trim();
            if(!rawText) return;
            const lines = rawText.split('\n').filter(l => l.trim() !== "");
            students = lines.map((line, idx) => {
                const parts = line.trim().split(/\s+/);
                return { id: parts[0], name: parts[1] || "이름없음", points: 0, score: "", date: "", attendance: 0, seat: idx };
            });
            save(); toggleModal('setupModal', false);
        }

        function save() {
            localStorage.setItem('classData', JSON.stringify(students));
            localStorage.setItem('classLogs', JSON.stringify(logs));
            if(document.getElementById('subjectTitle')) localStorage.setItem('classSubject', document.getElementById('subjectTitle').value);
            render();
        }

        function render() {
            const sList = document.getElementById('tab1');
            if(!students.length) sList.innerHTML = `<div onclick="toggleModal('setupModal', true)" class="py-20 text-center text-slate-300 font-bold bg-white rounded-3xl border-2 border-dashed cursor-pointer">명단을 복사해 붙여넣으세요</div>`;
            else sList.innerHTML = students.map(s => {
                const isWarning = (s.attendance >= 3);
                return `
                <div class="bg-white p-5 rounded-3xl border ${isWarning ? 'warning-card' : 'border-slate-100'} flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4 text-left">
                        <div class="w-12 h-10 ${isWarning ? 'bg-rose-500 text-white' : 'bg-indigo-50 text-indigo-500'} rounded-xl flex items-center justify-center font-black text-[10px]">${s.id}</div>
                        <div><h3 class="font-bold text-slate-800 text-lg">${s.name}</h3><p class="text-[10px] ${isWarning ? 'text-rose-600 font-black' : 'text-slate-400'}">출결 누적: ${s.attendance || 0}</p></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updatePoint('${s.id}', 1)" class="w-10 h-10 bg-slate-50 text-indigo-600 rounded-xl font-bold"><i class="fas fa-star"></i></button>
                        <button onclick="openLogModal('${s.id}', '${s.name}')" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-plus"></i></button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('scoreList').innerHTML = students.map(s => `
                <div class="bg-white p-4 rounded-2xl border flex items-center gap-3 shadow-sm text-center text-xs">
                    <div class="w-12 font-bold text-slate-300">${s.id}</div>
                    <div class="w-16 font-black text-slate-700">${s.name}</div>
                    <input type="date" value="${s.date}" onchange="updateScore('${s.id}', 'date', this.value)" class="flex-1 bg-slate-50 border-0 rounded-xl p-2 outline-none">
                    <input type="number" value="${s.score}" onchange="updateScore('${s.id}', 'score', this.value)" class="w-14 bg-indigo-50 border-0 rounded-xl p-2 font-black text-indigo-600 text-center outline-none">
                </div>`).join('');

            const sorted = [...students].sort((a, b) => a.seat - b.seat);
            document.getElementById('seatMap').innerHTML = sorted.map(s => `<div class="bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm"><p class="text-[9px] text-slate-300 font-bold mb-1">${s.id}</p><p class="font-black text-slate-800">${s.name}</p></div>`).join('');

            document.getElementById('logs').innerHTML = logs.map((l, idx) => `
                <div onclick="openEditLog(${idx})" class="bg-white p-5 rounded-3xl border-l-8 ${l.isAttendance ? 'border-rose-500 bg-rose-50/30' : 'border-indigo-500'} shadow-sm space-y-1 text-left cursor-pointer active:scale-95 transition">
                    <div class="flex justify-between items-center text-[10px] font-bold">
                        <div><span class="text-slate-800 text-sm font-black">${l.name}</span> <span class="ml-2 px-2 py-0.5 rounded-full ${l.isAttendance ? 'bg-rose-100 text-rose-500' : 'bg-indigo-50 text-indigo-500'} font-bold text-[8px] uppercase">${l.type}</span></div>
                        <span class="text-slate-300 text-[8px]">${l.time}</span>
                    </div>
                    <p class="text-sm text-slate-600 font-medium">${l.content}</p>
                </div>`).join('') || '<p class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest">NO RECORDS</p>';
        }

        function switchTab(n) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById(`tab${n}`).classList.add('active'); document.querySelectorAll('.nav-btn').forEach((b, i) => b.className = `nav-btn flex flex-col items-center ${i+1===n ? 'text-indigo-600' : 'text-slate-300'}`); }
        function updatePoint(id, v) { const s = students.find(s=>s.id==id); if(s) { s.points += v; save(); } }
        function updateScore(id, field, val) { const s = students.find(s => s.id == id); if(s) s[field] = val; localStorage.setItem('classData', JSON.stringify(students)); }
        function shuffleSeats() { let ns = Array.from({length:students.length}, (_,i)=>i).sort(()=>Math.random()-0.5); students.forEach((s,i)=>s.seat=ns[i]); save(); }
        function downloadTotalData() {
            let c = `학번,이름,상점,미인정횟수,날짜,점수\n`;
            students.forEach(s => { c += `${s.id},${s.name},${s.points},${s.attendance || 0},${s.date},${s.score}\n`; });
            const b = new Blob(["\ufeff" + c], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "곡선중_데이터.csv"; a.click();
        }
        render();
    </script>
</body>
</html>
